services:
  - type: web
    name: trustedge-api
    env: node
    plan: free
    buildCommand: "cd server && npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run db:seed"
    startCommand: "cd server && node server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGIN
        value: "*"
